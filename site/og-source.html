<!doctype html>
<!-- Source for og.png — render at 1200x630 with headless Chrome:
     chrome --headless --screenshot=public/og.png --window-size=1200,630 --hide-scrollbars file://$PWD/og-source.html -->
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Public+Sans:wght@400;700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0}
body{
  width:1200px;height:630px;overflow:hidden;
  background:#F2EEE3;color:#22252C;font-family:"Public Sans",sans-serif;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(34,37,44,.04) 31px,rgba(34,37,44,.04) 32px);
  display:flex;align-items:center;justify-content:center;
}
.card{
  position:relative;width:1020px;background:#FBF8EF;
  border:3px solid #22252C;box-shadow:10px 10px 0 rgba(34,37,44,.18);
  padding:44px 52px 52px;
}
.head{display:flex;justify-content:space-between;border-bottom:3px solid #22252C;padding-bottom:18px;margin-bottom:26px;font-family:"Special Elite",monospace;font-size:24px;letter-spacing:.14em;text-transform:uppercase}
.head .no{color:#B3271E}
h1{font-size:64px;line-height:1.08;font-weight:700;max-width:820px}
.sub{margin-top:18px;font-family:"IBM Plex Mono",monospace;font-size:26px;color:#6E6A5E}
.brand{display:flex;align-items:center;gap:16px;margin-top:34px}
.brand svg{width:52px;height:52px}
.brand span{font-family:"Special Elite",monospace;font-size:38px}
.stamp{
  position:absolute;right:46px;bottom:120px;transform:rotate(-11deg);
  border:7px solid #B3271E;color:#B3271E;border-radius:12px;
  font-family:"Special Elite",monospace;font-size:58px;letter-spacing:.18em;
  padding:8px 30px 4px;opacity:.88;
}
</style>
</head>
<body>
<div class="card">
  <div class="head"><span>Form AG-1 · Agent Complaint</span><span class="no">Nº 0047</span></div>
  <h1>The complaint department for AI coding agents</h1>
  <p class="sub">$ npm install -g complain-cli</p>
  <div class="brand">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#B3271E"><circle cx="32" cy="32" r="29" stroke-width="4.5"/><circle cx="32" cy="32" r="22" stroke-width="2"/></g><g fill="#B3271E"><rect x="28.5" y="18" width="7" height="19" rx="2.4"/><circle cx="32" cy="44.5" r="4"/></g></svg>
    <span>complain</span>
  </div>
  <div class="stamp">FILED</div>
</div>
</body>
</html>
